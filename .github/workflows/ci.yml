name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py config.py db.py auth.py ingest.py rag_chain.py

      - name: Ruff (lint)
        run: python -m ruff check .

      - name: Bandit (security)
        run: python -m bandit -c bandit.yaml -q -r .

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt || true

      - name: Run tests
        run: pytest -q -p no:cacheprovider

      - name: E2E smoke (Playwright) — optional
        if: ${{ env.E2E_BASE_URL != '' }}
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium
          python scripts/e2e_smoke_playwright.py

      - name: Retrieval eval set (weekly) — optional
        if: ${{ github.event_name == 'schedule' && env.GROK_API_KEY != '' }}
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: python scripts/run_eval.py
