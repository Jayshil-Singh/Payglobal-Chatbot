name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest python-dotenv bcrypt

      - name: Syntax check
        run: python -m py_compile app.py config.py db.py auth.py ingest.py rag_chain.py

      - name: Run tests
        run: pytest -q
